name: Deploy

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  deploy-main-service:
    name: Services - run remote build and deploy script
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSR2_HOST }}
          port: ${{ secrets.SSR2_PORT }}
          username: ${{ secrets.SSR2_USERNAME }}
          key: ${{ secrets.SSR2_KEY_RSA }}
          script: |
            set -e
            bash ${{ secrets.SSR2_REDEPLOY_SERVICE_SCRIPT }} mainservice ${{ github.event_name == 'release' && 'master' || github.ref_name }}
            bash ${{ secrets.SSR2_REDEPLOY_SERVICE_SCRIPT }} filebox ${{ github.event_name == 'release' && 'master' || github.ref_name }}
